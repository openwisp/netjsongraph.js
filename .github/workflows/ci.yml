name: netjsongraph.js CI BUILD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  qa-checks:
    name: QA-Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "::set-output name=dir::$(yarn cache dir)"

      - name: Cache yarn
        uses: actions/cache@v5
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Set up Python
        uses: actions/setup-python@v6

      - name: Installing dependencies
        run: |
          yarn install
          python --version
          pip install "openwisp-utils[qa]~=1.2.0"
          sudo npm install -g prettier

      - name: QA checks
        run: ./run-qa-checks

  build:
    name: Tests and Coverage (${{ matrix.build-type }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build-type: [dev, prod, echarts-only]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "::set-output name=dir::$(yarn cache dir)"

      - name: Cache yarn
        uses: actions/cache@v5
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Installing dependencies
        run: |
          yarn install

      - name: Build (Prod Full)
        if: matrix.build-type == 'prod'
        run: yarn build:full

      - name: Build (Echarts Only)
        if: matrix.build-type == 'echarts-only'
        run: yarn build:echarts-only

      - name: Running Server (Dev)
        if: matrix.build-type == 'dev'
        run: yarn start &

      - name: Running Server (Dist)
        if: matrix.build-type == 'prod' || matrix.build-type == 'echarts-only'
        run: npx --yes http-server dist -p 8080 &

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:8080

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Set up ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Check chrome and chromedriver version
        run: |
          chrome --version
          which chrome
          chromedriver --version
          which chromedriver

      - name: Unit tests
        if: matrix.build-type == 'dev'
        run: yarn coverage --testPathIgnorePatterns=test/netjsongraph.browser.test.js

      - name: Browser tests
        # Test timeout set to 30 seconds in CI since it runs slower
        run: yarn test --runInBand --testTimeout=30000 test/netjsongraph.browser.test.js

      - name: Coveralls
        if: matrix.build-type == 'dev'
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event_name=='push' }}
    env:
      MAPBOX_URL_TEMPLATE: ${{ secrets.MAPBOX_URL_TEMPLATE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Installing dependencies
        run: |
          yarn install

      - name: Build
        run: yarn build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
